<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robot Coder 🤖</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">🤖 Robot Coder</div>
    <div class="status" id="status-bar">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">Not connected</span>
    </div>
  </header>

  <!-- Main workspace -->
  <div class="workspace">
    <!-- Blockly takes the left side -->
    <div id="blockly-div"></div>

    <!-- Right panel: run log -->
    <div class="stage-panel">
      <div class="stage-header">
        <h2>📋 My Program</h2>
        <span class="step-count" id="step-count">0 steps</span>
      </div>
      <div class="program-list" id="program-list">
        <div class="empty-state">
          <div class="empty-icon">👈</div>
          <p>Drag blocks here to build your program!</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <button class="btn-clear" id="btn-clear">🗑️ Clear</button>
    <button class="btn-play" id="btn-play">
      <span class="play-icon">▶</span>
      <span class="play-text">Play!</span>
    </button>
  </footer>

  <!-- Success overlay (shows when program finishes) -->
  <div class="overlay" id="overlay" style="display:none">
    <div class="overlay-card">
      <div class="overlay-emoji">🎉</div>
      <h2>Program Done!</h2>
      <p>Your robot finished all the steps!</p>
      <button onclick="closeOverlay()">▶ Run Again</button>
    </div>
  </div>

  <!-- Blockly scripts -->
  <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
  <script src="https://unpkg.com/blockly/msg/en.js"></script>
  <script src="blocks.js"></script>
  <script src="script.js"></script>

</body>
</html>
